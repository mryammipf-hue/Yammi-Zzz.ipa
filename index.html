        .info-box p {

            font-size: 15px;
        }

        /* BUTTON STYLES */

            background-color: #ff4b2b;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 30px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn:hover {
            background-color: #ffffff;
